services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - waha

  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    env_file:
      - .env.waha
    volumes:
      - waha_sessions:/app/.sessions
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  waha_sessions:
